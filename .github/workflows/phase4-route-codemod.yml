name: Phase 4 Route Metadata Codemod

on:
  push:
    branches:
      - feat/metadata-social-preview-normalization
    paths:
      - scripts/apply-phase4-route-metadata.mjs
      - .github/workflows/phase4-route-codemod.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out Phase 4 branch
        uses: actions/checkout@v4
        with:
          ref: feat/metadata-social-preview-normalization
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Normalize route metadata
        run: node scripts/apply-phase4-route-metadata.mjs

      - name: Commit normalized metadata
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No route metadata changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app lib scripts
          git commit -m "feat(metadata): normalize route metadata and social previews"
          git push origin HEAD:feat/metadata-social-preview-normalization
