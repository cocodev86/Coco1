name: Repository Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture brand validation
        id: brand
        shell: bash
        run: |
          set +e
          node scripts/validate-brand-assets.mjs > brand-validation.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload brand validation log
        uses: actions/upload-artifact@v4
        with:
          name: brand-validation-log
          path: brand-validation.log
          retention-days: 1

      - name: Enforce brand validation
        if: steps.brand.outputs.status != '0'
        run: exit 1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Validate public assets
        run: npm run validate:assets

      - name: Build
        run: npm run build
