name: Repository Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate brand system
        run: node scripts/validate-brand-assets.mjs

      - name: Validate metadata system
        run: node scripts/validate-metadata.mjs

      - name: Validate documentation portal
        run: node scripts/validate-docs-portal.mjs

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Validate public assets
        run: npm run validate:assets

      - name: Build
        run: npm run build
